<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicCollect — Sign In</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container" style="padding-top: 60px;">
    <div class="card">
        <h1>CivicCollect</h1>
        <p>Sign in with your RWA-approved phone number.</p>

        <!-- Step 1: Login -->
        <div id="step-login">
            <div class="msg msg-error" id="login-error"></div>

            <label>Role</label>
            <select id="role-select">
                <option value="resident">Resident</option>
                <option value="rwa_admin">RWA Admin</option>
            </select>

            <label>Phone number</label>
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
                <div style="padding:10px 12px; background:#F4F6F8; border:1px solid #DDE1E7; border-radius:8px; font-size:14px; color:#555; white-space:nowrap;">
                    +91
                </div>
                <input type="tel" id="phone-input" 
                    placeholder="10 digit number"
                    maxlength="10"
                    style="margin-bottom:0;"
                    oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)">
            </div>

            <label>Password</label>
            <input type="password" id="password-input" placeholder="Enter password">

            <button class="btn btn-primary" onclick="login()">Sign in</button>
        </div>

        <!-- Step 2: Profile (first time only) -->
        <div id="step-register" style="display:none;">
            <div class="msg msg-error" id="register-error"></div>
            <h2>Complete your profile</h2>
            <p>This is a one-time setup. You won't be asked again.</p>

            <label>Full name</label>
            <input type="text" id="reg-name" placeholder="Your full name">

            <label>Address</label>
            <input type="text" id="reg-address" placeholder="Flat 4B, Block C">

            <label>Locality</label>
            <input type="text" id="reg-locality" placeholder="Sector 12, RWA Name">

            <button class="btn btn-primary" onclick="registerUser()">Save and continue</button>
        </div>

    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
