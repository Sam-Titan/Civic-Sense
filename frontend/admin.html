<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicCollect — Admin</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Topbar -->
<div class="topbar">
    <span class="topbar-brand">CivicCollect</span>
    <div style="display:flex; align-items:center; gap:10px;">
        <span class="topbar-role">RWA Admin</span>
        <button class="btn btn-secondary"
            style="width:auto; padding:4px 12px; margin:0; font-size:12px;"
            onclick="logout()">
            Sign out
        </button>
    </div>
</div>

<div class="container">

    <!-- Stats -->
    <div class="card">
        <h2>Overview</h2>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value" id="stat-total">—</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-box">
                <div class="stat-value amber" id="stat-pending">—</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-box">
                <div class="stat-value blue" id="stat-acknowledged">—</div>
                <div class="stat-label">Acknowledged</div>
            </div>
        </div>
    </div>

    <!-- All complaints -->
    <div class="card">
        <h2>All complaints</h2>
        <div id="complaints-list">
            <p>Loading...</p>
        </div>
    </div>

    <!-- Whitelist management -->
    <div class="card">
        <h2>Whitelist management</h2>
        <div class="msg msg-error" id="whitelist-error"></div>
        <div class="msg msg-success" id="whitelist-success"></div>

        <label>Phone number</label>
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
            <div style="padding:10px 12px; background:#F4F6F8; border:1px solid #DDE1E7; border-radius:8px; font-size:14px; color:#555; white-space:nowrap;">
                +91
            </div>
            <input type="tel" id="whitelist-phone"
                placeholder="10 digit number"
                maxlength="10"
                style="margin-bottom:0;"
                oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)">
        </div>

        <button class="btn btn-primary" onclick="addToWhitelist()">
            Add number
        </button>

        <div class="divider"></div>

        <div id="whitelist-list">
            <p>Loading...</p>
        </div>
    </div>

</div>

<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
